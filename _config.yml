# -------------------------------
# Basic site settings
# -------------------------------
title: Yifei Cai - Academic Website
description: Personal site showcasing research, publications, and projects
url: "https://caiyifei2008.github.io"
baseurl: ""

remote_theme: "mmistakes/minimal-mistakes@4.28.0"
plugins:
  - jekyll-remote-theme

# -------------------------------
# Author info
# -------------------------------
author:
  name: Yifei Cai
  email: your-email@example.com
  affiliation: Iowa State University, Artificial Intelligence & Cybersecurity
  orcid: "0000-0000-0000-0000"
  github: caiyifei2008
  linkedin: your-linkedin-url

# -------------------------------
# Navigation / Pages
# -------------------------------
nav:
  - title: Home
    url: /
  - title: Publications
    url: /publications/
  - title: Projects
    url: /projects/
  - title: Contact
    url: /contact/

# -------------------------------
# Plugins & Markdown
# -------------------------------
markdown: kramdown
highlighter: rouge

# -------------------------------
# Collections for publications (optional)
# -------------------------------
collections:
  publications:
    output: true
    permalink: /:collection/:name

# -------------------------------
# Optional: social links for footer
# -------------------------------
social_links:
  - name: GitHub
    url: https://github.com/caiyifei2008
  - name: LinkedIn
    url: https://www.linkedin.com/in/your-linkedin-url/
  - name: ORCID
    url: https://orcid.org/0000-0000-0000-0000

# -------------------------------
# Other settings
# -------------------------------
paginate: 5
